name: Deploy Azure Monitoring

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment name
        required: true
        default: dev
      location:
        description: Azure region
        required: true
        default: eastus
      auto_apply:
        description: Apply Terraform after planning
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_environment: ${{ inputs.environment }}
  TF_VAR_location: ${{ inputs.location }}
  TF_VAR_target_resource_id: ${{ vars.MONITOR_TARGET_RESOURCE_ID }}
  TF_VAR_ops_email: ${{ secrets.MONITOR_OPS_EMAIL }}

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write Terraform backend config
        working-directory: terraform
        run: |
          cat > backend.hcl <<EOF
          resource_group_name  = "${{ vars.TF_STATE_RESOURCE_GROUP }}"
          storage_account_name = "${{ vars.TF_STATE_STORAGE_ACCOUNT }}"
          container_name       = "${{ vars.TF_STATE_CONTAINER }}"
          key                  = "${{ vars.TF_STATE_KEY }}"
          EOF

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config=backend.hcl

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -out monitoring.tfplan

      - name: Terraform apply
        if: ${{ inputs.auto_apply == 'true' }}
        working-directory: terraform
        run: terraform apply -auto-approve monitoring.tfplan
